version: '3.9'

services:
  app:
    build: .
    image: cattr-custom:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    networks:
       - default
#      - web
    environment:
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_KEY=${APP_KEY}
      # Initial admin user is only created on first run — change values in .env if needed
      - APP_ADMIN_EMAIL=${APP_ADMIN_EMAIL}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - APP_ADMIN_NAME=${APP_ADMIN_NAME}

  db:
    image: percona:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=cattr
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    cap_add:
      - SYS_NICE
    volumes:
      - ./data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', "--password=${DB_PASSWORD}", '-u', 'root']
      timeout: 20s
      retries: 10
