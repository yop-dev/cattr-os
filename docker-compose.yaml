version: '3.9'

services:
  app:
    build: .
    image: cattr-custom:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/app/storage
    networks:
       - default
#      - web
    environment:
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_KEY=${APP_KEY}
      # Initial admin user is only created on first run â€” change values in .env if needed
      - APP_ADMIN_EMAIL=${APP_ADMIN_EMAIL}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
      - APP_ADMIN_NAME=${APP_ADMIN_NAME}
      - APP_URL=${APP_URL:-http://localhost}
      - MAIL_MAILER=${MAIL_MAILER:-log}
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-465}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${MAIL_ENCRYPTION:-ssl}
      - MAIL_FROM_ADDRESS=${MAIL_FROM_ADDRESS}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-Cattr}

  db:
    image: percona:8.0
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=cattr
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    cap_add:
      - SYS_NICE
    volumes:
      - ./data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', "--password=${DB_PASSWORD}", '-u', 'root']
      timeout: 20s
      retries: 10
