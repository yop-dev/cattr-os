# Host-level Nginx reverse proxy for Cattr
# Placed at: /etc/nginx/sites-available/cattr.conf on the DigitalOcean server
# Then: ln -s /etc/nginx/sites-available/cattr.conf /etc/nginx/sites-enabled/
#
# Before using:
#   1. Replace time.yourcompany.com with your actual domain
#   2. Run: certbot --nginx -d time.yourcompany.com
#      Certbot will automatically fill in the SSL certificate paths below
#
# Requires: APP_PORT=127.0.0.1:8080 in your .env on the server

server {
    listen 80;
    server_name time.yourcompany.com;

    # Certbot will add SSL redirect here automatically
    # Do not remove this block — certbot needs it to verify domain ownership

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
        client_max_body_size 512M;
    }
}
